# 班级宠物园 · 前端自动部署到 Cloudflare Pages
# 触发: 推送到 main 分支 -> 自动构建并部署; 也可在 Actions 页手动触发
# 效果等同于 Cloudflare 控制台 Git 集成: GitHub 更新即自动重新部署, 自定义域 pet.classe.ccwu.cc 保持不变
name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

# 避免并发部署互相覆盖
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite + vue-tsc)
        run: npm run build
        env:
          # 生产构建指向 Cloudflare Worker API, 自动关闭本地 mock
          VITE_API_URL: https://api.classe.ccwu.cc

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 部署到现有 Pages 项目 (自定义域 pet.classe.ccwu.cc 挂在这个项目上)
          # 若你的真实项目名不是 class-pet-garden-6fq, 改这一行即可
          command: pages deploy dist --project-name=class-pet-garden-6fq --commit-dirty=true
