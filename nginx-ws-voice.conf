# =============================================================
# 班级宠物园 · 流式语音 WebSocket 反代 (Route B 启用)
# 作用: 把  wss://<你的域名>/ws/voice  升级并转发到本机 Node 服务
# 部署位置: VPS (198.20.0.151) 的 nginx 真实站点配置
#   - 找到实际生效的站点配置 (通常在 /etc/nginx/sites-enabled/ 或 /etc/nginx/conf.d/)
#   - 把下面这个 location 块加进已有的 server { } 内, 与 /api/ 反代并列
#
# 注意:
#   1) nginx 前缀匹配取“最长前缀”, /ws/voice 会自动优先于 location / 的 SPA 兜底
#   2) proxy_pass 末尾不要加斜杠, 否则路径会被改写; 必须保留原始 /ws/voice
#   3) 必须带 Upgrade / Connection 头, 否则 WebSocket 无法握手
#   4) 关闭缓冲 + 放宽超时, 让 TTS 的 PCM 帧边到边下行, 长语音不被掐断
# =============================================================

location /ws/voice {
    # ---- WebSocket 升级 (核心) ----
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # ---- 透传客户端信息 ----
    # 服务端用 x-forwarded-proto 拼 MP3 降级 URL, 用 Host 拼回连地址
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ---- 原样转发到本机 Node 服务 (voiceWs 监听 3002) ----
    proxy_pass http://localhost:3002;

    # ---- 流式优化 ----
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 10s;
}

# =============================================================
# 可选: 若希望 /api/ 也统一走本机 Node (与 Vercel 共用同一 Neon 数据库),
# 可把现有 /api/ 反代目标从 Vercel 改成 localhost:3002, 例如:
#
#   location /api/ {
#       proxy_http_version 1.1;
#       proxy_set_header Upgrade $http_upgrade;
#       proxy_set_header Connection "upgrade";
#       proxy_set_header Host $host;
#       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#       proxy_set_header X-Forwarded-Proto $scheme;
#       proxy_pass http://localhost:3002/;
#   }
#
# 注意: 仅当 VPS 上 Node 已用 DATABASE_URL 指向与 Vercel 相同的数据库时才建议这样做,
#       否则会出现“设备绑定/学生查不到”的数据不一致问题。最小改动可只保留上面的 /ws/voice。
# =============================================================
