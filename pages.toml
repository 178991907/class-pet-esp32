name = "classpet-web"
pages_build_output_dir = "dist"
compatibility_date = "2024-11-01"
# 构建命令: npm run build  (在仓库根目录执行, 产出 dist/)
# 重要: 在 Pages 控制台的 Build settings 里增加构建环境变量 VITE_API_URL = https://<你的 api worker 地址>
#   (例如 https://classpet-api.<your-subdomain>.workers.dev)
# 这样前端生产构建会把 API 指向 Cloudflare Worker, 并自动关闭本地 mock 适配器。
