name=esp-sr
version=1.0.0
author=Espressif
maintainer=
sentence=ESP-SR speech recognition (wake word) prebuilt engine libs for ESP32-S3.
paragraph=Prebuilt .a engine (wakenet/multinet/AFE) from esp-sr 1.0 (IDF 4.4). Model weights (get_coeff_*) are pure read-only data linked directly into the firmware; only the referenced wake word's coeff is pulled in.
category=Signal Input/Output
url=
architectures=esp32
# 预编译库: arduino-cli 会自动把 src/esp32s3/*.a 链接进固件 (等价于 -Lsrc/esp32s3 -l<name>),
# 且位于主 --start-group 内, 因此可被 sketch 中 WakeWordEngine 引用的符号解析。
# 注意: arduino-cli 1.5.x 不读取本文件的 ldflags 字段, 故改为预编译库结构。
precompiled=true
